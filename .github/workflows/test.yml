name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy packages/godoo/src packages/godoo-testcontainers/src

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
      - run: uv sync
      - run: uv run pytest packages/ -v --cov --cov-report=xml -m "not integration"
      - uses: codecov/codecov-action@v5
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    strategy:
      fail-fast: false
      matrix:
        odoo-version: ["17.0", "18.0", "19.0"]
    env:
      ODOO_VERSION: ${{ matrix.odoo-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
      - run: uv sync
      - run: uv run pytest tests/integration/ -v -s -m integration --log-cli-level=ERROR
        timeout-minutes: 15
