name: Release

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: pypi

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - run: uv sync

      - name: Replace yanked v1.0.0 tag with v0.1.0
        run: |
          if git ls-remote --tags origin refs/tags/v1.0.0 | grep -q .; then
            git fetch origin refs/tags/v1.0.0:refs/tags/v1.0.0
            TAGGED_COMMIT=$(git rev-parse v1.0.0^{commit})
            git push origin :refs/tags/v1.0.0
            git tag v0.1.0 "$TAGGED_COMMIT"
            git push origin v0.1.0
          fi

      - name: Semantic Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release version

      - name: Publish to PyPI
        if: steps.release.outcome == 'success'
        run: uv publish --trusted-publishing always
